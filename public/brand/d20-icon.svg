<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" aria-hidden="true">
  <title>Dado a 20 facce  faccia con punto interrogativo</title>
  <!-- Tre facce triangolari visibili (vertice superiore); giallo, bordi e numeri neri; ? al posto del 20 -->
  <path d="M60 18 L22 78 L60 98 Z" fill="#FCD34D" stroke="#0a0a0a" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M60 18 L98 78 L60 98 Z" fill="#FBBF24" stroke="#0a0a0a" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M22 78 L98 78 L60 98 Z" fill="#EAB308" stroke="#0a0a0a" stroke-width="2.4" stroke-linejoin="round"/>
  <!-- Piccole facce laterali (suggeriscono il solido a 20 facce) -->
  <path d="M22 78 L12 88 L60 98 Z" fill="#FDE047" stroke="#0a0a0a" stroke-width="1.8" stroke-linejoin="round"/>
  <path d="M98 78 L108 88 L60 98 Z" fill="#FACC15" stroke="#0a0a0a" stroke-width="1.8" stroke-linejoin="round"/>
  <text x="42" y="62" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#0a0a0a">7</text>
  <text x="78" y="62" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="700" fill="#0a0a0a">14</text>
  <text x="18" y="92" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="8" font-weight="700" fill="#0a0a0a">3</text>
  <text x="102" y="92" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="8" font-weight="700" fill="#0a0a0a">11</text>
  <text x="60" y="92" text-anchor="middle" font-family="system-ui,Segoe UI,sans-serif" font-size="22" font-weight="800" fill="#0a0a0a">?</text>
</svg>
